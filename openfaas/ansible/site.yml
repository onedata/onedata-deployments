- hosts:
  - openfaas-vm
  any_errors_fatal: true
  gather_facts: yes
  tasks:
  - name: Install python3-venv at system level
    become: yes
    package:
      name: python3-venv
      state: present
      update_cache: yes
  - name: Create the virtual environment in ~/.vm-prep
    command:
      cmd: "python3 -m venv {{ ansible_user_dir }}/.vm-prep"
      creates: "{{ ansible_user_dir }}/.vm-prep/bin/python3"
  - name: Upgrade pip, setuptools, and packaging INSIDE the new venv
    command:
      cmd: "{{ ansible_user_dir }}/.vm-prep/bin/pip install --upgrade pip setuptools packaging"
  - name: Set the python interpreter to the new venv
    set_fact:
      ansible_python_interpreter: "{{ ansible_user_dir }}/.vm-prep/bin/python3"
  - include_role:
      name: common
  - include_role:
      name: openfaas
  - include_role:
      name: openfaas-pod-status-monitor
  - include_role:
      name: openfaas-sidecars
- hosts:
  - oneprovider
  any_errors_fatal: true
  tasks:
  - include_role:
      name: provider-config
